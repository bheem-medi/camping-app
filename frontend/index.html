<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camping Adventures - Find Your Perfect Camping Spot</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>🏕️ Camping Adventures</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>Discover Amazing Camping Packages</h1>
            <p>Explore the best camping spots with our curated packages</p>
        </div>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search by location..." class="search-input">
            <button onclick="searchPackages()" class="btn btn-primary">Search</button>
        </div>

        <div id="map" class="map-container"></div>

        <div class="packages-section">
            <h2>Featured Camping Packages</h2>
            <div id="packagesList" class="packages-grid"></div>
        </div>
    </div>

    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <script src="js/api.js"></script>
    <script src="js/map.js"></script>
    <script src="js/packages.js"></script>
    
    <script>
        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadPackages();
            initMap();
        });
    </script>
</body>
</html>
